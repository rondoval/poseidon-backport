name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        backend: ["off", "serial"]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # scripts/docker-build.sh runs the build in the shared toolchain container
      # (the same wrapper build.sh uses), so the configure incantation and image
      # tag live in one place. Build, then stage the install() tree into dist/.
      - name: Build and stage (${{ matrix.backend }} backend)
        run: |
          ./scripts/docker-build.sh
          ./scripts/docker-build.sh --target install
        env:
          POSEIDON_INSTALL_DIR: dist
          POSEIDON_CONFIGURE_ARGS: "-DPOSEIDON_DEBUG_BACKEND=${{ matrix.backend }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: poseidon-${{ matrix.backend }}
          path: dist
          if-no-files-found: error
