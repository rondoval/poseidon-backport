name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Build then package each variant via the shared container wrapper (the same
      # scripts/docker-build.sh build.sh uses). The `package` target stages whatever
      # is built, so a full build must precede it. Distinct build dirs keep the two
      # variants from clobbering each other.
      - name: Build and package (off / production backend)
        run: |
          ./scripts/docker-build.sh
          ./scripts/docker-build.sh --target package
        env:
          POSEIDON_BUILD_DIR: build
          POSEIDON_CONFIGURE_ARGS: "-DPOSEIDON_DEBUG_BACKEND=off"

      - name: Build and package (serial / debug backend)
        run: |
          ./scripts/docker-build.sh
          ./scripts/docker-build.sh --target package
        env:
          POSEIDON_BUILD_DIR: build-serial
          POSEIDON_CONFIGURE_ARGS: "-DPOSEIDON_DEBUG_BACKEND=serial"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Poseidon ${{ github.ref_name }}"
          files: |
            build/Poseidon-*.lha
            build-serial/Poseidon-*.lha
          generate_release_notes: true
